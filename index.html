<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Anonymous community voting. No account needed." />
  <title>Community Votes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --bg: #ffffff;
      --surface: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --glass: rgba(255, 255, 255, 0.8);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --primary-light: rgba(79, 70, 229, 0.1);
        --glass: rgba(15, 23, 42, 0.8);
      }
    }

    /* Theme Toggle */
    html.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary-light: rgba(79, 70, 229, 0.1);
      --glass: rgba(15, 23, 42, 0.8);
    }
    
    html.dark .sun { display: none; }
    html.dark .moon { display: block; }

    #theme-toggle { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    #theme-toggle:active { transform: scale(0.9); }
    
    .loading-dots { display: flex; justify-content: center; gap: 4px; padding: 40px 0; }
    .loading-dots span { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: blink 1.4s infinite both; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    header {
      margin-bottom: 64px;
      text-align: center;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
      color: var(--text);
      line-height: 1;
    }

    .sub {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 450;
    }

    /* List & Cards */
    #list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .rank {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      opacity: 0.5;
      width: 24px;
    }

    .body {
      flex: 1;
      min-width: 0;
    }

    .text {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .time {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .vbtn {
      background: transparent;
      border: none;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .vbtn:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    .vbtn.active-up {
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .vbtn.active-down {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .vbtn:disabled { opacity: 0.3; cursor: not-allowed; }

    .score {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      user-select: none;
    }

    .del {
      margin-left: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      opacity: 0.4;
      transition: all 0.2s;
      display: flex;
      align-items: center;
    }
    .del:hover { color: #ef4444; opacity: 1; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
      background: #0f172a;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* Modals & Overlays */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .overlay.open { display: flex; animation: fadeIn 0.2s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
      border: 1px solid var(--border);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text);
    }

    .modal-sub {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { background: var(--border); }

    /* FAB */
    #fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: all 0.2s;
    }
    #fab:hover { color: var(--text); border-color: var(--text); transform: scale(1.05); }

    /* Inputs */
    input[type=password], textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }
    input[type=password]:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }
    textarea { min-height: 140px; resize: none; }

    #state {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
      font-weight: 500;
    }

    .ts-wrap { margin-bottom: 24px; display: flex; justify-content: center; }

    .err {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .form { display: flex; flex-direction: column; gap: 16px; }
  </style>

</head>
<body>
<div class="wrap">
  <header>
    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
      <div style="flex:1"></div>
      <h1 style="flex:2">Voices</h1>
      <div style="flex:1; display:flex; justify-content:flex-end">
        <button id="theme-toggle" class="vbtn" style="border:1px solid var(--border)" aria-label="Toggle Theme">
          <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
    <p class="sub">Speak your mind, anonymously.</p>
  </header>

  <div id="toast"></div>
  <div id="state">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div id="list" style="display:none"></div>
</div>

<button id="fab" onclick="openAdmin()" aria-label="Admin">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<!-- Turnstile Modal -->
<div class="overlay" id="ts-overlay">
  <div class="modal">
    <p class="modal-title" style="margin-bottom:8px">Verify you're human</p>
    <p class="modal-sub">Complete the check to cast your vote.</p>
    <div class="ts-wrap">
      <div class="cf-turnstile" id="ts-widget" data-sitekey="1x00000000000000000000AA" data-callback="onTsSuccess" data-theme="auto"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeTs()">Cancel</button>
      <button class="btn" id="ts-submit" disabled onclick="submitVote()">Submit Vote</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="overlay" id="admin-overlay">
  <div class="modal modal-wide">
    <div class="modal-head">
      <span class="modal-title">Admin</span>
      <button class="vbtn" onclick="closeAdmin()">✕</button>
    </div>

    <div id="admin-auth">
      <div class="form">
        <input type="password" id="admin-key-input" placeholder="Admin key" />
        <p class="err" id="auth-err" style="display:none">Wrong key</p>
        <button class="btn" onclick="adminLogin()">Unlock</button>
      </div>
    </div>

    <div id="admin-panel" style="display:none">
      <div class="form">
        <textarea id="new-stmt" placeholder="New statement…" maxlength="500"></textarea>
        <p class="err" id="create-err" style="display:none"></p>
        <button class="btn" id="add-btn" onclick="addStatement()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><path d="M12 5v14M5 12h14"/></svg> Add Statement</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const SITE_KEY = document.querySelector('.cf-turnstile')?.dataset.sitekey || '1x00000000000000000000AA';

  // ── State ───────────────────────────────────────────────────────────────
  let statements = [];
  let myVotes = {};
  let adminKey = '';
  let pendingVote = null; // { id, type }
  let tsToken = null;
  let adminAuthed = false;

  // ── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
  }

  // ── Time ─────────────────────────────────────────────────────────────────
  function timeAgo(ts) {
    if (!ts) return '';
    const d = ts._seconds ? ts._seconds * 1000 : ts.seconds ? ts.seconds * 1000 : new Date(ts).getTime();
    const diff = Date.now() - d;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function render() {
    const listEl = document.getElementById('list');
    const stateEl = document.getElementById('state');

    if (statements.length === 0) {
      listEl.style.display = 'none';
      stateEl.style.display = 'block';
      stateEl.innerHTML = `
        <div style="opacity:0.5; display:flex; flex-direction:column; align-items:center; gap:16px;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          <p>No statements yet. Be the first to share.</p>
        </div>
      `;
      return;
    }

    stateEl.style.display = 'none';
    listEl.style.display = 'block';
    listEl.innerHTML = '';

    statements.forEach((s, i) => {
      const uv = myVotes[s.id];
      const score = s.votes || 0;
      const scoreClass = score > 0 ? 'pos' : score < 0 ? 'neg' : '';
      const scoreText = (score > 0 ? '+' : '') + score;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="rank">#${i + 1}</span>
        <div class="body">
          <div class="text">${escHtml(s.text)}</div>
          <div class="time">${timeAgo(s.createdAt)}</div>
        </div>
        <div class="actions">
          <button class="vbtn ${uv === 'up' ? 'active-up' : ''}" onclick="voteClick('${s.id}','up')" aria-label="Upvote">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11l5-5 5 5M7 17l5-5 5 5"/></svg>
          </button>
          <span class="score">${scoreText}</span>
          <button class="vbtn ${uv === 'down' ? 'active-down' : ''}" onclick="voteClick('${s.id}','down')" aria-label="Downvote">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M7 7l5 5 5-5"/></svg>
          </button>
          ${adminAuthed ? `<button class="del" onclick="deleteStmt('${s.id}')" title="Delete">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
          </button>` : ''}
        </div>
      `;
      listEl.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Load ─────────────────────────────────────────────────────────────────
  async function load() {
    try {
      const res1 = await fetch('/api/statements');
      const res2 = await fetch('/api/my-votes');
      
      const s = await res1.json();
      const v = await res2.json();

      if (s.error) {
        document.getElementById('state').innerHTML = `
          <div style="max-width:320px; margin:0 auto; text-align:center;">
            <p class="err">${s.error}</p>
            <p class="time" style="margin-top:12px; line-height:1.4">Please check your Firebase configuration or project status.</p>
          </div>
        `;
        return;
      }

      statements = s;
      myVotes = v;
      render();
    } catch (err) {
      console.error(err);
      document.getElementById('state').textContent = 'Failed to connect to server.';
    }
  }

  // ── Voting ────────────────────────────────────────────────────────────────
  function voteClick(id, type) {
    pendingVote = { id, type };
    tsToken = null;
    document.getElementById('ts-submit').disabled = true;
    // Reset widget
    if (window.turnstile) window.turnstile.reset('#ts-widget');
    document.getElementById('ts-overlay').classList.add('open');
  }

  function onTsSuccess(token) {
    tsToken = token;
    document.getElementById('ts-submit').disabled = false;
  }

  function closeTs() {
    document.getElementById('ts-overlay').classList.remove('open');
    pendingVote = null;
    tsToken = null;
  }

  async function submitVote() {
    if (!pendingVote || !tsToken) return;
    const { id, type } = pendingVote;
    closeTs();

    try {
      const res = await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ statementId: id, type, turnstileToken: tsToken }),
      });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Vote failed'); return; }

      const updated = data.statement;
      statements = statements.map(s => s.id === updated.id ? updated : s)
        .sort((a, b) => (b.votes || 0) - (a.votes || 0));
      myVotes[id] = data.userVote;

      if (data.action === 'retracted') toast('Vote removed');
      else if (data.action === 'changed') toast(type === 'up' ? 'Changed to upvote' : 'Changed to downvote');
      else toast(type === 'up' ? 'Upvoted!' : 'Downvoted!');

      render();
    } catch {
      toast('Vote failed');
    }
  }

  // ── Admin ─────────────────────────────────────────────────────────────────
  function openAdmin() {
    document.getElementById('admin-overlay').classList.add('open');
  }

  function closeAdmin() {
    document.getElementById('admin-overlay').classList.remove('open');
  }

  function adminLogin() {
    const key = document.getElementById('admin-key-input').value.trim();
    if (!key) return;
    adminKey = key;
    adminAuthed = true;
    document.getElementById('admin-auth').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    render();
  }



  async function addStatement() {
    const text = document.getElementById('new-stmt').value.trim();
    const errEl = document.getElementById('create-err');
    const btn = document.getElementById('add-btn');
    if (!text) return;
    btn.disabled = true;
    errEl.style.display = 'none';
    try {
      const res = await fetch('/api/statements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 403) { adminKey = ''; adminAuthed = false; document.getElementById('admin-auth').style.display = 'block'; document.getElementById('admin-panel').style.display = 'none'; }
        errEl.textContent = data.error || 'Failed';
        errEl.style.display = 'block';
        return;
      }
      statements.unshift(data);
      document.getElementById('new-stmt').value = '';
      render();
    } catch {
      errEl.textContent = 'Network error';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteStmt(id) {
    if (!window.confirm('Delete this statement?')) return;
    try {
      const res = await fetch(`/api/statements/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-key': adminKey },
      });
      if (res.status === 403) { adminKey = ''; adminAuthed = false; return; }
      statements = statements.filter(s => s.id !== id);
      render();
      toast('Deleted');
    } catch {
      toast('Delete failed');
    }
  }

  // ── Theme ─────────────────────────────────────────────────────────────────
  const themeToggle = document.getElementById('theme-toggle');
  const htmlEl = document.documentElement;
  
  if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    htmlEl.classList.add('dark');
  }

  themeToggle.addEventListener('click', () => {
    htmlEl.classList.toggle('dark');
    localStorage.setItem('theme', htmlEl.classList.contains('dark') ? 'dark' : 'light');
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  load();
</script>
</body>
</html>
