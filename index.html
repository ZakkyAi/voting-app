<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Anonymous community voting. No account needed." />
  <title>Community Votes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 20px 100px;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1e293b 0%, #6366f1 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .sub {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
      background: #1e293b;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 99px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from { transform: translate(-50%, -20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* List */
    #list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 24px;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }

    .card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .rank {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--border);
      min-width: 40px;
      flex-shrink: 0;
      padding-top: 4px;
    }

    .card:nth-child(1) .rank { color: #f59e0b; }
    .card:nth-child(2) .rank { color: #94a3b8; }
    .card:nth-child(3) .rank { color: #b45309; }

    .body {
      flex: 1;
      min-width: 0;
      padding-top: 4px;
    }

    .text {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
      margin-bottom: 8px;
    }

    .time {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .time::before {
      content: '•';
      color: var(--border);
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: #f1f5f9;
      padding: 8px;
      border-radius: 10px;
    }

    .vbtn {
      background: white;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 14px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .vbtn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f8fafc;
    }

    .vbtn.active-up {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .vbtn.active-down {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444;
    }

    .vbtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .score {
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
    }

    .score.pos { color: var(--primary); }
    .score.neg { color: #ef4444; }

    .del {
      margin-top: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 16px;
      transition: color 0.2s;
    }
    .del:hover { color: #ef4444; }

    /* States */
    #state {
      color: var(--text-muted);
      font-size: 1rem;
      text-align: center;
      padding: 60px 0;
      font-weight: 500;
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
    .modal-wide { max-width: 500px; }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text);
    }
    .modal-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .xbtn {
      background: #f1f5f9;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .xbtn:hover { background: #e2e8f0; color: var(--text); }

    .ts-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 12px; justify-content: flex-end; }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 16px; }
    input[type=password], textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    input[type=password]:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    textarea { resize: vertical; min-height: 120px; }

    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: #f1f5f9;
      color: var(--text-muted);
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .btn-ghost:hover { background: #e2e8f0; color: var(--text); }

    .err {
      font-size: 14px;
      color: #ef4444;
      background: #fef2f2;
      padding: 8px 12px;
      border-radius: 8px;
      border-left: 4px solid #ef4444;
    }

    /* FAB */
    #fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 56px;
      height: 56px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #fab:hover {
      transform: rotate(90deg) scale(1.1);
      background: var(--primary-hover);
    }
  </style>

</head>
<body>
<div class="wrap">
  <header>
    <h1>Community Votes</h1>
    <p class="sub">Vote anonymously. No account needed.</p>
  </header>

  <div id="toast"></div>
  <div id="state">Loading…</div>
  <div id="list" style="display:none"></div>
</div>

<button id="fab" onclick="openAdmin()" aria-label="Admin">⚙</button>

<!-- Turnstile Modal -->
<div class="overlay" id="ts-overlay">
  <div class="modal">
    <p class="modal-title" style="margin-bottom:8px">Verify you're human</p>
    <p class="modal-sub">Complete the check to cast your vote.</p>
    <div class="ts-wrap">
      <div class="cf-turnstile" id="ts-widget" data-sitekey="__SITE_KEY__" data-callback="onTsSuccess" data-theme="light"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeTs()">Cancel</button>
      <button class="btn" id="ts-submit" disabled onclick="submitVote()">Submit Vote</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="overlay" id="admin-overlay">
  <div class="modal modal-wide">
    <div class="modal-head">
      <span class="modal-title">Admin Panel</span>
      <button class="xbtn" onclick="closeAdmin()">✕</button>
    </div>

    <div id="admin-auth">
      <div class="form">
        <input type="password" id="admin-key-input" placeholder="Admin key" />
        <p class="err" id="auth-err" style="display:none">Wrong key</p>
        <button class="btn" onclick="adminLogin()">Unlock</button>
      </div>
    </div>

    <div id="admin-panel" style="display:none">
      <div class="form">
        <textarea id="new-stmt" placeholder="New statement…" maxlength="500"></textarea>
        <p class="err" id="create-err" style="display:none"></p>
        <button class="btn" id="add-btn" onclick="addStatement()">+ Add Statement</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const SITE_KEY = document.querySelector('.cf-turnstile')?.dataset.sitekey || '1x00000000000000000000AA';

  // ── State ───────────────────────────────────────────────────────────────
  let statements = [];
  let myVotes = {};
  let adminKey = '';
  let pendingVote = null; // { id, type }
  let tsToken = null;
  let adminAuthed = false;

  // ── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
  }

  // ── Time ─────────────────────────────────────────────────────────────────
  function timeAgo(ts) {
    if (!ts) return '';
    const d = ts._seconds ? ts._seconds * 1000 : ts.seconds ? ts.seconds * 1000 : new Date(ts).getTime();
    const diff = Date.now() - d;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function render() {
    const listEl = document.getElementById('list');
    const stateEl = document.getElementById('state');

    if (statements.length === 0) {
      listEl.style.display = 'none';
      stateEl.style.display = 'block';
      stateEl.textContent = 'No statements yet.';
      return;
    }

    stateEl.style.display = 'none';
    listEl.style.display = 'block';
    listEl.innerHTML = '';

    statements.forEach((s, i) => {
      const uv = myVotes[s.id];
      const score = s.votes || 0;
      const scoreClass = score > 0 ? 'pos' : score < 0 ? 'neg' : '';
      const scoreText = (score > 0 ? '+' : '') + score;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="rank">#${i + 1}</span>
        <div class="body">
          <div class="text">${escHtml(s.text)}</div>
          <div class="time">${timeAgo(s.createdAt)}</div>
        </div>
        <div class="actions">
          <button class="vbtn ${uv === 'up' ? 'active-up' : ''}" onclick="voteClick('${s.id}','up')" aria-label="Upvote">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
          </button>
          <span class="score ${scoreClass}">${scoreText}</span>
          <button class="vbtn ${uv === 'down' ? 'active-down' : ''}" onclick="voteClick('${s.id}','down')" aria-label="Downvote">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          ${adminAuthed ? `<button class="del" onclick="deleteStmt('${s.id}')" title="Delete">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
          </button>` : ''}
        </div>
      `;
      listEl.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Load ─────────────────────────────────────────────────────────────────
  async function load() {
    try {
      const [s, v] = await Promise.all([
        fetch('/api/statements').then(r => r.json()),
        fetch('/api/my-votes').then(r => r.json()),
      ]);
      statements = s;
      myVotes = v;
      render();
    } catch {
      document.getElementById('state').textContent = 'Failed to load.';
    }
  }

  // ── Voting ────────────────────────────────────────────────────────────────
  function voteClick(id, type) {
    pendingVote = { id, type };
    tsToken = null;
    document.getElementById('ts-submit').disabled = true;
    // Reset widget
    if (window.turnstile) window.turnstile.reset('#ts-widget');
    document.getElementById('ts-overlay').classList.add('open');
  }

  function onTsSuccess(token) {
    tsToken = token;
    document.getElementById('ts-submit').disabled = false;
  }

  function closeTs() {
    document.getElementById('ts-overlay').classList.remove('open');
    pendingVote = null;
    tsToken = null;
  }

  async function submitVote() {
    if (!pendingVote || !tsToken) return;
    const { id, type } = pendingVote;
    closeTs();

    try {
      const res = await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ statementId: id, type, turnstileToken: tsToken }),
      });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Vote failed'); return; }

      const updated = data.statement;
      statements = statements.map(s => s.id === updated.id ? updated : s)
        .sort((a, b) => (b.votes || 0) - (a.votes || 0));
      myVotes[id] = data.userVote;

      if (data.action === 'retracted') toast('Vote removed');
      else if (data.action === 'changed') toast(type === 'up' ? 'Changed to upvote' : 'Changed to downvote');
      else toast(type === 'up' ? 'Upvoted!' : 'Downvoted!');

      render();
    } catch {
      toast('Vote failed');
    }
  }

  // ── Admin ─────────────────────────────────────────────────────────────────
  function openAdmin() {
    document.getElementById('admin-overlay').classList.add('open');
  }

  function closeAdmin() {
    document.getElementById('admin-overlay').classList.remove('open');
  }

  function adminLogin() {
    const key = document.getElementById('admin-key-input').value.trim();
    if (!key) return;
    adminKey = key;
    adminAuthed = true;
    document.getElementById('admin-auth').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    render();
  }



  async function addStatement() {
    const text = document.getElementById('new-stmt').value.trim();
    const errEl = document.getElementById('create-err');
    const btn = document.getElementById('add-btn');
    if (!text) return;
    btn.disabled = true;
    errEl.style.display = 'none';
    try {
      const res = await fetch('/api/statements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 403) { adminKey = ''; adminAuthed = false; document.getElementById('admin-auth').style.display = 'block'; document.getElementById('admin-panel').style.display = 'none'; }
        errEl.textContent = data.error || 'Failed';
        errEl.style.display = 'block';
        return;
      }
      statements.unshift(data);
      document.getElementById('new-stmt').value = '';
      render();
    } catch {
      errEl.textContent = 'Network error';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteStmt(id) {
    if (!window.confirm('Delete this statement?')) return;
    try {
      const res = await fetch(`/api/statements/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-key': adminKey },
      });
      if (res.status === 403) { adminKey = ''; adminAuthed = false; return; }
      statements = statements.filter(s => s.id !== id);
      render();
      toast('Deleted');
    } catch {
      toast('Delete failed');
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  load();
</script>
</body>
</html>
